<style>
  *{box-sizing:border-box}
  html,body{margin:0}

  .checkitem{display:flex;align-items:center;gap:12px;padding:12px 2px;min-height:var(--touch-target);border-bottom:1px solid var(--border);cursor:pointer;font-size:15px;user-select:none}

  @keyframes toastin{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}

  .filterrow::-webkit-scrollbar{display:none}
  .fchip{white-space:nowrap;padding:6px 12px;border-radius:var(--radius-full);border:1px solid var(--border);background:var(--card);font-size:13px;font-weight:500;color:var(--muted-foreground);cursor:pointer;flex-shrink:0}
  .fchip[aria-selected=true]{background:var(--primary);color:var(--primary-foreground);border-color:var(--primary)}
  .exc-list{flex:1;overflow-y:auto;padding:6px 18px 12px;display:flex;flex-direction:column;gap:10px}
  .exc{border:1px solid var(--border);border-radius:var(--radius-xl);background:var(--card);padding:13px 14px;display:flex;gap:12px}

  .exc__chip{width:38px;height:38px;border-radius:var(--radius-md);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--status-overdue-bg);color:var(--status-overdue-fg)}
  .exc--critical .exc__chip{background:var(--status-critical-bg);color:var(--status-critical-fg)}
  .exc__chip svg{width:19px;height:19px}
  .exc__body{flex:1;min-width:0}
  .exc__title{font-size:15px;font-weight:600;line-height:1.3}
  .exc__meta{font-size:12.5px;color:var(--muted-foreground);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .exc__meta svg{width:12px;height:12px}
  .exc__badges{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap;align-items:center}
  .wf{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:var(--radius-full);font-size:12px;font-weight:500}
  .sl-theme-toggle{position:fixed;bottom:16px;right:16px;z-index:2000;width:40px;height:40px;border-radius:var(--radius-full);border:1px solid var(--border);background:var(--card);color:var(--foreground);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow-md)}
  .sl-theme-toggle svg{width:18px;height:18px}

<body>
<div id="root"></div>
<script type="text/babel">
const NS = window.ShadcnUiDesignSystem_fd8ccd;
const { Button, StatusBadge, ThresholdReadout, NumericKeypad, TaskCard, Tabs, TabsList, TabsTrigger, EvidenceUpload, SignaturePad, Checkbox, Switch, TimelineRow, Toaster } = NS;
const { useState, useRef, useEffect } = React;

function Lucide({ name, cls }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = "";
      const i = document.createElement("i");
      i.setAttribute("data-lucide", name);
      ref.current.appendChild(i);
      window.lucide.createIcons();
    }
  }, [name]);
  return <span ref={ref} className={cls} style={{display:"inline-flex"}} />;
}

// --- seed data ---
const INITIAL = [
  { id: "t1", checkType: "temperature", title: "Walk-in fridge temp", status: "overdue", time: "Was due 1:00 PM", max: 5, unit: "°C", requiredEvidence: ["reading", "photo"] },
  { id: "t2", checkType: "temperature", title: "Freezer temp", status: "due", time: "Due 3:00 PM", max: -18, unit: "°C", requiredEvidence: ["reading"] },
  { id: "t3", checkType: "temperature", title: "Hot-hold — pass line", status: "due", time: "Due 3:30 PM", min: 63, unit: "°C", requiredEvidence: ["reading"] },
  { id: "t4", checkType: "cleaning", title: "Sanitize prep surfaces", status: "due", time: "Due 5:00 PM", requiredEvidence: ["checklist", "photo", "signature"], checklist: ["Surfaces cleared & wiped", "Sanitizer applied (contact time met)", "Equipment cleaned"] },
  { id: "t5", checkType: "allergen", title: "Allergen matrix check", status: "due", time: "Due 6:00 PM", requiredEvidence: ["checklist", "signature"], checklist: ["14 allergens cross-checked vs menu", "No unlabelled changes today"] },
  { id: "t6", checkType: "opening", title: "Opening checklist", status: "done", result: "Complete" },
  { id: "t7", checkType: "temperature", title: "Display fridge temp", status: "done", result: "4°C" },
];

const ORDER = { overdue: 0, due: 1, upcoming: 2, "pending-sync": 3, done: 4, failed: 5 };

function StatusBar() {
  return (
    <div className="statusbar">
      <span>9:41</span>
      <span className="dots">
        <Lucide name="signal" /><Lucide name="wifi" /><Lucide name="battery-full" />
      </span>
    </div>
  );
}

function PinScreen({ onUnlock }) {
  const [pin, setPin] = useState("");
  const [err, setErr] = useState(false);
  const CODE = "2468";
  const tap = (k) => {
    setErr(false);
    setPin((p) => {
      if (k === "back") return p.slice(0, -1);
      if (p.length >= 4) return p;
      const next = p + k;
      if (next.length === 4) {
        setTimeout(() => {
          if (next === CODE) onUnlock();
          else { setErr(true); setPin(""); }
        }, 180);
      }
      return next;
    });
  };
  const keys = ["1","2","3","4","5","6","7","8","9","blank","0","back"];
  return (
    <div className="screen">
      <StatusBar />
      <div className="pin">
        <div className="logo"><Lucide name="clipboard-check" /></div>
        <div>
          <div className="ttl">Enter your PIN</div>
        </div>
        <div className="ctx">Shared tablet · Riverside Kitchen<br/>Tap your 4-digit code to start your shift</div>
        <div className="pindots">
          {[0,1,2,3].map((i) => (
            <span key={i} className={"pindot" + (err ? " err" : pin.length > i ? " on" : "")} />
          ))}
        </div>
        <div className="pinerr">{err ? "Incorrect PIN — try again" : ""}</div>
        <div className="pinpad">
          {keys.map((k, idx) =>
            k === "blank" ? <span key={idx} className="pinkey pinkey--blank" /> :
            <button key={idx} className="pinkey" onClick={() => tap(k)}>
              {k === "back" ? <Lucide name="delete" /> : k}
            </button>
          )}
        </div>
        <div className="hint">Demo PIN: 2468</div>
      </div>
    </div>
  );
}

function Today({ tasks, onOpen, onLock, tab, setTab, onNavigate, exceptions }) {
  const counts = {
    overdue: tasks.filter(t => t.status === "overdue").length,
    due: tasks.filter(t => t.status === "due").length,
    done: tasks.filter(t => t.status === "done" || t.status === "failed").length,
  };
  const filtered = tasks
    .filter(t => {
      if (tab === "todo") return ["overdue","due","upcoming","pending-sync"].includes(t.status);
      if (tab === "done") return ["done","failed"].includes(t.status);
      return true;
    })
    .sort((a,b) => (ORDER[a.status] - ORDER[b.status]));
  return (
    <div className="screen">
      <StatusBar />
      <div className="hdr">
        <div>
          <h1>Today</h1>
          <div className="date">Tuesday, 16 September</div>
        </div>
        <div className="actions">
          <button className="iconbtn"><Lucide name="bell" /><span className="dot">1</span></button>
          <button className="iconbtn" onClick={onLock} title="Lock"><Lucide name="lock" /></button>
        </div>
      </div>
      <div className="org">
        <span className="avatar">RK</span>Riverside Kitchen<Lucide name="chevrons-up-down" />
      </div>
      <div className="summary">
        <div className="stat stat--overdue"><div className="n">{counts.overdue}</div><div className="l"><Lucide name="alert-circle" />Overdue</div></div>
        <div className="stat"><div className="n">{counts.due}</div><div className="l"><Lucide name="clock" />Due now</div></div>
        <div className="stat stat--done"><div className="n">{counts.done}</div><div className="l"><Lucide name="check-circle-2" />Done</div></div>
      </div>
      <div className="tabsrow">
        <Tabs value={tab} onValueChange={setTab}>
          <TabsList style={{width:"100%"}}>
            <TabsTrigger value="todo" style={{flex:1}}>To do</TabsTrigger>
            <TabsTrigger value="done" style={{flex:1}}>Done</TabsTrigger>
            <TabsTrigger value="all" style={{flex:1}}>All</TabsTrigger>
          </TabsList>
        </Tabs>
      </div>
      <div className="list">
        {filtered.map(t => (
          <TaskCard
            key={t.id}
            checkType={t.checkType}
            title={t.title}
            status={t.status}
            time={t.time}
            result={t.result}
            onClick={() => (["due","overdue"].includes(t.status)) && onOpen(t)}
          />
        ))}
        {filtered.length === 0 && (
          <div style={{textAlign:"center",padding:"40px 0",color:"var(--muted-foreground)"}}>
            <Lucide name="check-check" /><div style={{marginTop:8,fontSize:14}}>Nothing here. Nice work.</div>
          </div>
        )}
      </div>
      <BottomNav active="today" overdue={counts.overdue} exceptions={exceptions} onNavigate={onNavigate} />
    </div>
  );
}

function BottomNav({ active = "today", overdue, exceptions, onNavigate }) {
  const items = [
    { id: "today", label: "Today", icon: "list-checks", badge: overdue },
    { id: "exceptions", label: "Exceptions", icon: "triangle-alert", badge: exceptions },
    { id: "timeline", label: "Timeline", icon: "history" },
    { id: "more", label: "More", icon: "menu" },
  ];
  return (
    <div className="nav">
      {items.map(it => (
        <div key={it.id} className="navitem" aria-current={active === it.id || undefined} onClick={() => onNavigate && onNavigate(it.id)}>
          {it.badge ? <span className="badge">{it.badge}</span> : null}
          <Lucide name={it.icon} />{it.label}
        </div>
      ))}
    </div>
  );
}

const FLOW_SUB = {
  temperature: "Enter the reading",
  cleaning: "Confirm the cleaning steps",
  allergen: "Confirm the allergen check",
  opening: "Complete the checklist",
  closing: "Complete the checklist",
  generic: "Complete the check",
};
const CHECK_ICO = <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5" /></svg>;

function CompleteFlow({ task, onCancel, onDone }) {
  const idemKey = useRef("idem_" + ((window.crypto && crypto.randomUUID) ? crypto.randomUUID() : Date.now().toString(16) + Math.random().toString(16).slice(2))).current;
  const req = task.requiredEvidence || ["reading"];
  const [val, setVal] = useState("");
  const [photo, setPhoto] = useState("idle");
  const [prog, setProg] = useState(0);
  const [sig, setSig] = useState(null);
  const [checks, setChecks] = useState({});
  const [offline, setOffline] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const timers = useRef([]);
  useEffect(() => () => timers.current.forEach((t) => { clearTimeout(t); clearInterval(t); }), []);

  const capture = () => {
    setProg(0);
    setPhoto("capturing");
    timers.current.push(setTimeout(() => {
      setPhoto("compressing");
      let p = 0;
      const iv = setInterval(() => {
        p += 20;
        setProg(Math.min(p, 100));
        if (p >= 100) { clearInterval(iv); setPhoto(offline ? "offline-queued" : "uploaded"); }
      }, 110);
      timers.current.push(iv);
    }, 450));
  };
  const toggle = (i) => setChecks((c) => ({ ...c, [i]: !c[i] }));

  // --- required-evidence gating ---
  const readingDone = val !== "" && val !== "-" && !Number.isNaN(Number(val));
  const num = Number(val);
  const pass = readingDone ? ((task.min == null || num >= task.min) && (task.max == null || num <= task.max)) : null;
  const photoDone = ["uploaded", "offline-queued"].includes(photo);
  const sigDone = !!sig && ((sig.mode === "typed" && sig.initials) || (sig.mode === "drawn" && sig.dataUrl));
  const checklist = task.checklist || [];
  const checklistDone = checklist.every((_, i) => checks[i]);

  const missing = [];
  if (req.includes("reading") && !readingDone) missing.push("reading");
  if (req.includes("checklist") && !checklistDone) missing.push("all items checked");
  if (req.includes("photo") && !photoDone) missing.push("photo");
  if (req.includes("signature") && !sigDone) missing.push("sign-off");
  const canSubmit = missing.length === 0 && !submitting;

  const submit = () => {
    setSubmitting(true);
    timers.current.push(setTimeout(() => onDone(task, { reading: val, pass, offline, idemKey }), 550));
  };

  const ok = <span className="ok">{CHECK_ICO}</span>;
  const readingFail = req.includes("reading") && readingDone && pass === false && !offline;
  const label = submitting ? "Saving…"
    : offline ? "Queue for sync"
    : readingFail ? "Log failure & continue"
    : req.includes("reading") && readingDone ? "Complete — pass"
    : "Complete check";

  return (
    <div className="screen">
      <StatusBar />
      <div className="flowhdr">
        <button className="iconbtn" onClick={onCancel}><Lucide name="chevron-left" /></button>
        <div>
          <h2>{task.title}</h2>
          <div className="sub">{(FLOW_SUB[task.checkType] || FLOW_SUB.generic)}</div>
        </div>
      </div>
      <div className="flowbody">
        {req.includes("reading") && (
          <div className="evsec evsec--reading">
            <ThresholdReadout value={val} unit={task.unit} min={task.min} max={task.max} size="xl" />
            <div style={{ marginTop: 16, display: "flex", justifyContent: "center" }}>
              <NumericKeypad value={val} onChange={setVal} />
            </div>
          </div>
        )}
        {req.includes("checklist") && (
          <div className="evsec">
            <div className="evsec__lab">Checklist {checklistDone ? ok : <span className="req">Required</span>}</div>
            <div className="checklist">
              {checklist.map((c, i) => (
                <div key={i} className="checkitem" onClick={() => toggle(i)}>
                  <Checkbox checked={!!checks[i]} /> <span>{c}</span>
                </div>
              ))}
            </div>
          </div>
        )}
        {req.includes("photo") && (
          <div className="evsec">
            <div className="evsec__lab">Photo evidence {photoDone ? ok : <span className="req">Required</span>}</div>
            <EvidenceUpload
              state={photo}
              progress={prog}
              fileName="evidence.webp"
              fileSize="182 KB"
              hash="9f2a1c7be34d0a5518e2c4"
              onTakePhoto={capture}
              onChooseFile={capture}
              onRetry={capture}
              onRemove={() => setPhoto("idle")}
            />
          </div>
        )}
        {req.includes("signature") && (
          <div className="evsec">
            <div className="evsec__lab">Sign-off {sigDone ? ok : <span className="req">Required</span>}</div>
            <SignaturePad defaultMode="typed" onChange={setSig} />
          </div>
        )}
      </div>
      <div className="flowfoot">
        {!canSubmit && !submitting && missing.length > 0 && (
          <div className="missing"><Lucide name="circle-alert" /> Still needed: {missing.join(", ")}</div>
        )}
        <Button
          size="lg"
          loading={submitting}
          disabled={!canSubmit}
          onClick={submit}
          style={{ width: "100%", height: 52, fontSize: 16, ...(readingFail ? { background: "var(--status-fail)" } : {}) }}
        >
          {label}
        </Button>
        <div className="offline-row">
          <Switch checked={offline} onCheckedChange={setOffline} /> Simulate offline device
        </div>
        {offline && <div className="idem">Idempotency-Key: {idemKey}</div>}
      </div>
    </div>
  );
}

function Timeline({ onNavigate, exceptions }) {
  const PAGE = 6;
  // Keyset pagination (F5): a real cursor keys on (occurred_at, id) of the last row —
  // never a numeric OFFSET — so inserts never shift the page. Demo advances a count.
  const [cursor, setCursor] = useState(PAGE);
  const shown = TIMELINE.slice(0, cursor);
  const hasMore = cursor < TIMELINE.length;
  return (
    <div className="screen">
      <StatusBar />
      <div className="hdr">
        <div><h1>Timeline</h1><div className="date">Audit history · Riverside Kitchen</div></div>
        <div className="actions"><button className="iconbtn"><Lucide name="filter" /></button></div>
      </div>
      <div className="tl">
        {shown.map((e, i) => (
          <TimelineRow key={e.id} actor={e.actor} actorType={e.actorType} action={e.action} subject={e.subject} time={e.time} edit={e.edit} last={i === shown.length - 1 && !hasMore} />
        ))}
        {hasMore
          ? <button className="loadmore" onClick={() => setCursor((c) => c + PAGE)}><Lucide name="chevron-down" /> Load older entries</button>
          : <div className="tl-end">Beginning of history</div>}
      </div>
      <BottomNav active="timeline" exceptions={exceptions} onNavigate={onNavigate} />

// --- Exceptions (state machine D2) ---
const WF = {
  open: { bg: "var(--status-fail-bg)", fg: "var(--status-fail-fg)", label: "Open" },
  acknowledged: { bg: "var(--status-info-bg)", fg: "var(--status-info-fg)", label: "Acknowledged" },
  in_progress: { bg: "var(--status-overdue-bg)", fg: "var(--status-overdue-fg)", label: "In progress" },
  resolved: { bg: "var(--status-pass-bg)", fg: "var(--status-pass-fg)", label: "Resolved" },
  verified: { bg: "var(--status-pass)", fg: "#fff", label: "Verified" },
  reopened: { bg: "var(--status-overdue-bg)", fg: "var(--status-overdue-fg)", label: "Reopened" },
};
const SEV = {
  high: { bg: "var(--status-overdue-bg)", fg: "var(--status-overdue-fg)", label: "High" },
  medium: { bg: "var(--status-info-bg)", fg: "var(--status-info-fg)", label: "Medium" },
  low: { bg: "var(--status-pending-bg)", fg: "var(--status-pending-fg)", label: "Low" },
};
const EXCEPTIONS = [
  { id: "x1", title: "Cold-chain breach on delivery", severity: "critical", state: "open", time: "15 Sep · 22:40", property: "Harbour Cafe", detail: "Received 12°C · target ≤ 5°C" },
  { id: "x2", title: "Display fridge above threshold", severity: "high", state: "in_progress", time: "16 Sep · 13:05", property: "Riverside Kitchen", detail: "9°C · target ≤ 5°C" },
  { id: "x3", title: "Freezer temp missed twice", severity: "high", state: "acknowledged", time: "16 Sep · 09:30", property: "Harbour Cafe" },
  { id: "x4", title: "Hot-hold below 63°C at lunch", severity: "medium", state: "resolved", time: "15 Sep · 12:20", property: "Riverside Kitchen" },
  { id: "x5", title: "Allergen matrix not confirmed", severity: "medium", state: "verified", time: "14 Sep · 18:00", property: "Harbour Cafe" },
  { id: "x6", title: "Opening checklist reopened for review", severity: "low", state: "reopened", time: "16 Sep · 08:10", property: "Riverside Kitchen" },
];
const EXC_FILTERS = [
  ["all", "All"], ["open", "Open"], ["acknowledged", "Acknowledged"],
  ["in_progress", "In progress"], ["resolved", "Resolved"], ["verified", "Verified"], ["reopened", "Reopened"],
];

function Exceptions({ onNavigate, exceptions }) {
  const [filter, setFilter] = useState("all");
  const rows = EXCEPTIONS.filter((e) => filter === "all" || e.state === filter);
  return (
    <div className="screen">
      <StatusBar />
      <div className="hdr">
        <div><h1>Exceptions</h1><div className="date">Failures &amp; breaches to work</div></div>
        <div className="actions"><button className="iconbtn"><Lucide name="arrow-up-down" /></button></div>
      </div>
      <div className="filterrow">
        {EXC_FILTERS.map(([id, label]) => (
          <button key={id} className="fchip" aria-selected={filter === id} onClick={() => setFilter(id)}>{label}</button>
        ))}
      </div>
      <div className="exc-list">
        {rows.map((e) => {
          const wf = WF[e.state];
          const crit = e.severity === "critical";
          return (
            <div key={e.id} className={"exc" + (crit ? " exc--critical" : "")}>
              <span className="exc__chip">
                <Lucide name={crit ? "octagon-alert" : "triangle-alert"} />
              </span>
              <div className="exc__body">
                <div className="exc__title">{e.title}</div>
                <div className="exc__meta">
                  <Lucide name="map-pin" />{e.property} · {e.time}{e.detail ? <> · <span style={{ fontFamily: "var(--font-mono)" }}>{e.detail}</span></> : null}
                </div>
                <div className="exc__badges">
                  {crit
                    ? <StatusBadge status="critical" size="sm" />
                    : <span className="wf" style={{ background: SEV[e.severity].bg, color: SEV[e.severity].fg }}>{SEV[e.severity].label}</span>}
                  <span className="wf" style={{ background: wf.bg, color: wf.fg }}>{wf.label}</span>
                </div>
              </div>
            </div>
          );
        })}
        {rows.length === 0 && (
          <div style={{ textAlign: "center", padding: "40px 0", color: "var(--muted-foreground)" }}>
            <Lucide name="check-check" /><div style={{ marginTop: 8, fontSize: 14 }}>No exceptions in this state.</div>
          </div>
        )}
      </div>
      <BottomNav active="exceptions" exceptions={exceptions} onNavigate={onNavigate} />
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState("pin");
  const [tasks, setTasks] = useState(INITIAL);
  const [active, setActive] = useState(null);
  const [tab, setTab] = useState("todo");

  const openTask = (t) => { setActive(t); setScreen("complete"); };
  const nav = (v) => { if (["today", "exceptions", "timeline"].includes(v)) setScreen(v); };
  const activeExc = EXCEPTIONS.filter(e => ["open", "acknowledged", "in_progress", "reopened"].includes(e.state)).length;
  const completeTask = (task, res) => {
    const isReading = (task.requiredEvidence || ["reading"]).includes("reading");
    const failed = isReading && res.pass === false;
    const status = res.offline ? "pending-sync" : (failed ? "failed" : "done");
    const resultStr = res.offline ? "Queued" : (isReading ? res.reading + task.unit : "Complete");
    setTasks(ts => ts.map(t => t.id === task.id
      ? { ...t, status, result: resultStr, time: undefined }
      : t));
    setScreen("today");
    if (res.offline) Toaster.info({ title: "Queued for sync", description: "Will upload when back online" });
    else if (failed) Toaster.error({ title: "Failure logged", description: res.reading + task.unit + " — exception raised" });
    else Toaster.success(isReading ? "Check passed — " + res.reading + task.unit : "Check completed");
  };

  return (
    <div className="phone">
      {screen === "pin" && <PinScreen onUnlock={() => setScreen("today")} />}
      {screen === "today" && <Today tasks={tasks} onOpen={openTask} onLock={() => setScreen("pin")} tab={tab} setTab={setTab} onNavigate={nav} exceptions={activeExc} />}
      {screen === "exceptions" && <Exceptions onNavigate={nav} exceptions={activeExc} />}
      {screen === "timeline" && <Timeline onNavigate={nav} exceptions={activeExc} />}
      {screen === "complete" && active && <CompleteFlow task={active} onCancel={() => setScreen("today")} onDone={completeTask} />}
      <Toaster />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);

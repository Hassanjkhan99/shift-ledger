<html lang="en">
<head>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:var(--font-sans);background:var(--background);color:var(--foreground);font-size:14px}
  #root{height:100vh}
  .app{display:grid;grid-template-columns:248px 1fr;height:100vh}
  /* Sidebar */
  .sb{background:var(--sidebar);border-right:1px solid var(--sidebar-border);display:flex;flex-direction:column;padding:12px;overflow:auto}
  .brand{display:flex;align-items:center;gap:10px;padding:8px 8px 14px}
  .brand .mark{width:32px;height:32px;border-radius:var(--radius-md);background:var(--primary);display:flex;align-items:center;justify-content:center}
  .brand .mark svg{width:19px;height:19px;color:#fff}
  .brand .nm{font-weight:700;letter-spacing:-0.02em;font-size:16px}
  .switch{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:var(--radius-md);border:1px solid var(--border);background:var(--card);cursor:pointer;margin-bottom:10px}
  .switch .av{width:26px;height:26px;border-radius:var(--radius-md);background:var(--primary);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .switch .txt{display:flex;flex-direction:column;line-height:1.2;flex:1;min-width:0}
  .switch .txt b{font-size:13px;font-weight:600}
  .switch .txt span{font-size:11px;color:var(--muted-foreground)}
  .switch svg{width:15px;height:15px;color:var(--muted-foreground)}
  .grp{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted-foreground);padding:12px 8px 4px}
  .nav{display:flex;align-items:center;gap:10px;padding:8px 9px;border-radius:var(--radius-md);color:var(--sidebar-foreground);cursor:pointer;font-weight:500;font-size:14px;transition:background .12s;border:none;background:transparent;width:100%;text-align:left;font-family:inherit}
  .nav:hover{background:var(--muted)}
  .nav[aria-current=true]{background:var(--sidebar-accent);color:var(--sidebar-accent-foreground)}
  .nav svg{width:18px;height:18px;color:var(--muted-foreground)}
  .nav[aria-current=true] svg{color:var(--sidebar-accent-foreground)}
  .sbfoot{margin-top:auto;display:flex;align-items:center;gap:10px;padding:8px}
  .sbfoot .av{width:30px;height:30px;border-radius:var(--radius-full);background:var(--slate-200);color:var(--slate-700);font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center}
  .sbfoot .txt{line-height:1.2}
  .sbfoot .txt b{font-size:13px;font-weight:500;display:block}
  .sbfoot .txt span{font-size:12px;color:var(--muted-foreground)}
  /* Main */
  .main{display:flex;flex-direction:column;overflow:hidden}
  .page{flex:1;overflow:auto;padding:24px 28px 40px}
  .phead{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px}
  .phead h1{margin:0;font-size:24px;font-weight:600;letter-spacing:-0.02em}
  .phead p{margin:4px 0 0;color:var(--muted-foreground);font-size:14px;max-width:640px}
  /* Table */
  .tablecard{border:1px solid var(--border);border-radius:var(--radius-xl);overflow:hidden;background:var(--card)}
  table{width:100%;border-collapse:collapse;font-size:14px}
  thead th{text-align:left;font-weight:500;color:var(--muted-foreground);padding:11px 16px;font-size:12px;text-transform:uppercase;letter-spacing:.03em;border-bottom:1px solid var(--border);background:var(--surface)}
  tbody td{padding:13px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
  tbody tr:last-child td{border-bottom:0}
  tbody tr:hover{background:var(--muted)}
  .mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
  .flag{display:inline-flex;align-items:center;gap:7px;font-weight:500}
  .flag .cc{font-family:var(--font-mono);font-size:11px;background:var(--muted);color:var(--muted-foreground);padding:1px 6px;border-radius:var(--radius-sm)}
  .muted{color:var(--muted-foreground)}
  .rowact{display:flex;gap:6px;justify-content:flex-end}
  .iconbtn{width:32px;height:32px;border-radius:var(--radius-md);border:1px solid var(--border);background:var(--card);color:var(--muted-foreground);display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
  .iconbtn:hover{background:var(--muted);color:var(--foreground)}
  .iconbtn svg{width:15px;height:15px}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:var(--radius-full);font-size:12px;font-weight:500}
  .pill--active{background:var(--status-pass-bg);color:var(--status-pass-fg)}
  .pill--off{background:var(--muted);color:var(--muted-foreground)}
  .pill--role{background:var(--accent);color:var(--accent-foreground)}
  /* Forms in dialogs */
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .field > label{font-size:13px;font-weight:500}
  .field .help{font-size:12px;color:var(--muted-foreground)}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .inp{height:36px;width:100%;border-radius:var(--radius-md);border:1px solid var(--input);background:transparent;padding:0 12px;font-family:var(--font-sans);font-size:14px;color:var(--foreground);box-shadow:var(--shadow-xs);outline:none}
  .inp:focus-visible{border-color:var(--ring);box-shadow:0 0 0 3px color-mix(in oklab,var(--ring) 40%,transparent)}
  .seg{display:flex;gap:8px}
  .segbtn{flex:1;height:36px;border-radius:var(--radius-md);border:1px solid var(--border);background:var(--card);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;color:var(--foreground);font-family:inherit}
  .segbtn svg{width:15px;height:15px}
  .segbtn--on{border-color:var(--primary);background:var(--accent);color:var(--primary)}
  .note{display:flex;gap:9px;background:var(--status-info-bg);border:1px solid color-mix(in oklab,var(--status-info) 25%,transparent);border-radius:var(--radius-md);padding:10px 12px;font-size:12.5px;line-height:1.5;color:var(--status-info-fg)}
  .note svg{width:16px;height:16px;flex-shrink:0;margin-top:1px}
  /* Templates */
  .tpl{display:flex;align-items:flex-start;gap:14px;padding:16px;border:1px solid var(--border);border-radius:var(--radius-xl);background:var(--card)}
  .tpl__ic{width:40px;height:40px;border-radius:var(--radius-md);background:var(--muted);color:var(--muted-foreground);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .tpl__ic svg{width:20px;height:20px}
  .tpl__b{flex:1;min-width:0}
  .tpl__t{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
  .tpl__ver{font-family:var(--font-mono);font-size:11px;color:var(--muted-foreground);background:var(--muted);padding:1px 6px;border-radius:var(--radius-sm)}
  .tpl__meta{font-size:13px;color:var(--muted-foreground);margin-top:4px;display:flex;gap:14px;flex-wrap:wrap}
  .tpl__meta b{color:var(--foreground);font-weight:500;font-family:var(--font-mono)}
  .tpl__ev{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
  .evtag{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;color:var(--muted-foreground);background:var(--muted);padding:3px 9px;border-radius:var(--radius-full)}
  .evtag svg{width:12px;height:12px}
  .stack{display:flex;flex-direction:column;gap:12px}
  /* Rollup */
  .roll{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
  .rollcard{border:1px solid var(--border);border-radius:var(--radius-xl);background:var(--card);padding:18px;cursor:pointer;transition:border-color .12s,box-shadow .12s}
  .rollcard:hover{border-color:var(--slate-300);box-shadow:var(--shadow-sm)}
  .rollcard__h{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .rollcard__h b{font-size:16px;font-weight:600}
  .rollcard__pct{font-family:var(--font-mono);font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
  .rollbar{height:8px;border-radius:var(--radius-full);background:var(--muted);overflow:hidden;margin:12px 0 12px;display:flex}
  .rollbar span{height:100%}
  .rollstats{display:flex;gap:8px;flex-wrap:wrap}
  .rolloutlets{margin-top:14px;border-top:1px solid var(--border);padding-top:12px;display:flex;flex-direction:column;gap:8px}
  .outlet{display:flex;align-items:center;justify-content:space-between;font-size:13px}
  .outlet .n{color:var(--muted-foreground);font-family:var(--font-mono)}
  .summary{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}
  .kpi{flex:1;min-width:150px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px}
  .kpi .n{font-size:26px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-0.02em}
  .kpi .l{font-size:12px;color:var(--muted-foreground);margin-top:3px}
  @media (max-width:900px){
    .app{grid-template-columns:1fr}
    .sb{flex-direction:row;align-items:center;gap:6px;overflow-x:auto;padding:8px;border-right:0;border-bottom:1px solid var(--sidebar-border)}
    .brand,.switch,.grp,.sbfoot{display:none}
    .nav{width:auto;white-space:nowrap}
  }
  .sl-theme-toggle{position:fixed;bottom:16px;right:16px;z-index:2000;width:40px;height:40px;border-radius:var(--radius-full);border:1px solid var(--border);background:var(--card);color:var(--foreground);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow-md)}
  .sl-theme-toggle svg{width:18px;height:18px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const NS = window.ShadcnUiDesignSystem_fd8ccd;
const { Button, StatusBadge, Card, Input, Switch, Combobox, DateRangePicker, Dialog, DialogHeader, DialogTitle, DialogDescription, DialogBody, DialogFooter, Toaster, EmptyState } = NS;
const { useState, useRef, useEffect } = React;

function Lucide({ name, cls }) {
  const ref = useRef(null);
  useEffect(() => { if (ref.current && window.lucide) { ref.current.innerHTML=""; const i=document.createElement("i"); i.setAttribute("data-lucide",name); ref.current.appendChild(i); window.lucide.createIcons(); } }, [name]);
  return <span ref={ref} className={cls} style={{display:"inline-flex"}} />;
}

// ---- reference data ----
const ROLES = [
  { value: "owner", label: "Owner" },
  { value: "org_admin", label: "Org admin" },
  { value: "regional", label: "Regional manager" },
  { value: "property_mgr", label: "Property manager" },
  { value: "shift_lead", label: "Shift lead" },
  { value: "staff", label: "Staff" },
  { value: "auditor", label: "External auditor" },
];
const roleLabel = (v) => (ROLES.find(r => r.value === v) || {}).label || v;
const TZ_BY_COUNTRY = { DE: "Europe/Berlin", NL: "Europe/Amsterdam" };
const TZ = [
  { value: "Europe/Berlin", label: "Europe/Berlin (CET/CEST)" },
  { value: "Europe/Amsterdam", label: "Europe/Amsterdam (CET/CEST)" },
  { value: "Europe/Zurich", label: "Europe/Zurich (CET/CEST)" },
  { value: "Europe/Vienna", label: "Europe/Vienna (CET/CEST)" },
  { value: "Europe/Brussels", label: "Europe/Brussels (CET/CEST)" },
];
const COUNTRIES = [{ value: "DE", label: "Germany (DE)" }, { value: "NL", label: "Netherlands (NL)" }];

const SEED_PROPERTIES = [
  { id: "p1", name: "Riverside Kitchen", country: "DE", tz: "Europe/Berlin", outlets: 3, status: "active" },
  { id: "p2", name: "Harbour Cafe", country: "NL", tz: "Europe/Amsterdam", outlets: 1, status: "active" },
  { id: "p3", name: "Alpine Bistro", country: "DE", tz: "Europe/Berlin", outlets: 2, status: "active" },
];
const SEED_USERS = [
  { id: "u1", name: "Jordan Diaz", email: "jordan@nourish.co", role: "org_admin", scope: "All properties", status: "active" },
  { id: "u2", name: "Ana Pérez", email: "ana@nourish.co", role: "property_mgr", scope: "Riverside Kitchen", status: "active" },
  { id: "u3", name: "Marco Rossi", email: "marco@nourish.co", role: "shift_lead", scope: "Riverside Kitchen", status: "active" },
  { id: "u4", name: "Leah Tan", email: "leah@nourish.co", role: "staff", scope: "Harbour Cafe", status: "active" },
  { id: "u5", name: "Priya Shah", email: "priya@auditcorp.eu", role: "auditor", scope: "All properties", status: "deactivated" },
];
const TEMPLATES = [
  { id: "t1", name: "Walk-in fridge temperature", type: "temperature", icon: "thermometer", threshold: "≤ 4°C", ev: ["reading", "photo"], version: 3, instr: "Insert probe into the middle shelf; wait for the reading to settle." },
  { id: "t2", name: "Freezer temperature", type: "temperature", icon: "thermometer", threshold: "≤ -18°C", ev: ["reading"], version: 2, instr: "Read the built-in display; log the coldest zone." },
  { id: "t3", name: "Hot-hold line", type: "temperature", icon: "thermometer", threshold: "≥ 63°C", ev: ["reading"], version: 1, instr: "Probe each hot-hold well before service." },
  { id: "t4", name: "Sanitize prep surfaces", type: "cleaning", icon: "spray-can", threshold: null, ev: ["checklist", "photo", "signature"], version: 4, instr: "Clear, wash, sanitize; observe contact time." },
  { id: "t5", name: "Allergen matrix check", type: "allergen", icon: "wheat", threshold: null, ev: ["checklist", "signature"], version: 1, instr: "Cross-check the 14 allergens against today's menu." },
];
const STARTER_LIB = {
  DE: [
    { name: "Kühlschrank-Temperatur (fridge)", threshold: "≤ 7°C", type: "temperature" },
    { name: "Tiefkühler-Temperatur (freezer)", threshold: "≤ -18°C", type: "temperature" },
    { name: "Heißhaltung (hot-hold)", threshold: "≥ 65°C", type: "temperature" },
    { name: "Reinigungsplan (cleaning)", threshold: null, type: "cleaning" },
  ],
  NL: [
    { name: "Koeling temperatuur (fridge)", threshold: "≤ 7°C", type: "temperature" },
    { name: "Vriezer temperatuur (freezer)", threshold: "≤ -18°C", type: "temperature" },
    { name: "Warmhouden (hot-hold)", threshold: "≥ 60°C", type: "temperature" },
    { name: "Allergenencontrole (allergen)", threshold: null, type: "allergen" },
  ],
};
const SEED_SCHEDULES = [
  { id: "s1", template: "Walk-in fridge temperature", recurrence: "daily", time: "08:00", assignType: "role", assignee: "Shift lead" },
  { id: "s2", template: "Hot-hold line", recurrence: "daily", time: "11:30", assignType: "role", assignee: "Shift lead" },
  { id: "s3", template: "Sanitize prep surfaces", recurrence: "daily", time: "17:00", assignType: "user", assignee: "Ana Pérez" },
  { id: "s4", template: "Allergen matrix check", recurrence: "weekly", time: "09:00", assignType: "role", assignee: "Property manager" },
];
const ROLLUP = [
  { id: "p1", name: "Riverside Kitchen", tz: "Europe/Berlin", done: 12, overdue: 1, failed: 1, total: 14,
    outlets: [{ n: "Main Kitchen", done: 8, total: 9 }, { n: "Prep Room", done: 3, total: 4 }, { n: "Bar", done: 1, total: 1 }] },
  { id: "p2", name: "Harbour Cafe", tz: "Europe/Amsterdam", done: 6, overdue: 0, failed: 0, total: 6,
    outlets: [{ n: "Kitchen", done: 6, total: 6 }] },
  { id: "p3", name: "Alpine Bistro", tz: "Europe/Berlin", done: 7, overdue: 2, failed: 0, total: 9,
    outlets: [{ n: "Kitchen", done: 5, total: 6 }, { n: "Terrace", done: 2, total: 3 }] },
];
const EV_ICON = { reading: "thermometer", photo: "camera", signature: "pen-line", checklist: "list-checks" };
const EV_LABEL = { reading: "Reading", photo: "Photo", signature: "Signature", checklist: "Checklist" };

// ================= Views =================

function Phead({ title, desc, action }) {
  return (
    <div className="phead">
      <div><h1>{title}</h1>{desc ? <p>{desc}</p> : null}</div>
      {action}
    </div>
  );
}

function PropertiesView() {
  const [rows, setRows] = useState(SEED_PROPERTIES);
  const [open, setOpen] = useState(false);
  const [name, setName] = useState("");
  const [country, setCountry] = useState("DE");
  const [tz, setTz] = useState("Europe/Berlin");
  const openNew = () => { setName(""); setCountry("DE"); setTz("Europe/Berlin"); setOpen(true); };
  const onCountry = (c) => { setCountry(c); if (TZ_BY_COUNTRY[c]) setTz(TZ_BY_COUNTRY[c]); };
  const save = () => {
    if (!name.trim()) return Toaster.error("Enter a property name");
    setRows(r => [...r, { id: "p" + (r.length + 1), name, country, tz, outlets: 1, status: "active" }]);
    setOpen(false);
    Toaster.success({ title: "Property created", description: name + " · " + tz });
  };
  return (
    <div className="page">
      <Phead title="Properties & outlets" desc="Each property sets the timezone that governs when its checks are due — the source of truth for occurrence wall-clock and DST."
        action={<Button onClick={openNew}><Lucide name="plus" /> Add property</Button>} />
      <div className="tablecard">
        <table>
          <thead><tr><th>Property</th><th>Country</th><th>Timezone</th><th>Outlets</th><th>Status</th><th></th></tr></thead>
          <tbody>
            {rows.map(p => (
              <tr key={p.id}>
                <td style={{fontWeight:500}}>{p.name}</td>
                <td><span className="flag"><span className="cc">{p.country}</span>{p.country === "DE" ? "Germany" : "Netherlands"}</span></td>
                <td className="mono muted">{p.tz}</td>
                <td className="mono">{p.outlets}</td>
                <td><span className={"pill " + (p.status === "active" ? "pill--active" : "pill--off")}>{p.status === "active" ? "Active" : "Inactive"}</span></td>
                <td><div className="rowact"><button className="iconbtn"><Lucide name="pencil" /></button></div></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <Dialog open={open} onOpenChange={setOpen}>
        <DialogHeader><DialogTitle>Add property</DialogTitle><DialogDescription>Timezone is load-bearing — it drives every scheduled check's due time.</DialogDescription></DialogHeader>
        <DialogBody>
          <div className="field"><label>Property name</label><input className="inp" value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Riverside Kitchen" /></div>
          <div className="two">
            <div className="field"><label>Country</label><Combobox value={country} onValueChange={onCountry} options={COUNTRIES} /></div>
            <div className="field"><label>Timezone (IANA)</label><Combobox value={tz} onValueChange={setTz} options={TZ} searchPlaceholder="Search zones…" /></div>
          </div>
          <div className="note"><Lucide name="package-open" /><span>Adding a <b style={{fontFamily:'var(--font-mono)'}}>{country}</b> property offers the {country === "DE" ? "German" : "Dutch"} HACCP starter pack of templates once created.</span></div>
        </DialogBody>
        <DialogFooter><Button variant="outline" onClick={() => setOpen(false)}>Cancel</Button><Button onClick={save}>Create property</Button></DialogFooter>
      </Dialog>
    </div>
  );
}

function UsersView() {
  const [rows, setRows] = useState(SEED_USERS);
  const [open, setOpen] = useState(false);
  const [email, setEmail] = useState("");
  const [role, setRole] = useState("staff");
  const [scope, setScope] = useState("all");
  const scopeOpts = [{ value: "all", label: "All properties" }, ...SEED_PROPERTIES.map(p => ({ value: p.id, label: p.name }))];
  const invite = () => {
    if (!email.includes("@")) return Toaster.error("Enter a valid email");
    const scopeLabel = (scopeOpts.find(s => s.value === scope) || {}).label;
    setRows(r => [...r, { id: "u" + (r.length + 1), name: email.split("@")[0], email, role, scope: scopeLabel, status: "invited" }]);
    setOpen(false);
    Toaster.success({ title: "Invite sent", description: email + " · " + roleLabel(role) });
  };
  const toggle = (id) => setRows(r => r.map(u => u.id === id ? { ...u, status: u.status === "deactivated" ? "active" : "deactivated" } : u));
  return (
    <div className="page">
      <Phead title="User management" desc="Invite teammates, assign one of the seven roles, and scope them to properties. Visible to Owners, Org admins, and (scoped) Property managers."
        action={<Button onClick={() => { setEmail(""); setRole("staff"); setScope("all"); setOpen(true); }}><Lucide name="user-plus" /> Invite user</Button>} />
      <div className="tablecard">
        <table>
          <thead><tr><th>Name</th><th>Role</th><th>Property scope</th><th>Status</th><th></th></tr></thead>
          <tbody>
            {rows.map(u => (
              <tr key={u.id}>
                <td><div style={{fontWeight:500}}>{u.name}</div><div className="muted" style={{fontSize:13}}>{u.email}</div></td>
                <td><span className="pill pill--role">{roleLabel(u.role)}</span></td>
                <td className="muted">{u.scope}</td>
                <td><span className={"pill " + (u.status === "active" ? "pill--active" : u.status === "invited" ? "pill--role" : "pill--off")}>{u.status === "active" ? "Active" : u.status === "invited" ? "Invited" : "Deactivated"}</span></td>
                <td><div className="rowact"><button className="iconbtn" title={u.status === "deactivated" ? "Reactivate" : "Deactivate"} onClick={() => toggle(u.id)}><Lucide name={u.status === "deactivated" ? "rotate-ccw" : "user-x"} /></button></div></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <Dialog open={open} onOpenChange={setOpen}>
        <DialogHeader><DialogTitle>Invite user</DialogTitle><DialogDescription>They'll get an email to set up their account.</DialogDescription></DialogHeader>
        <DialogBody>
          <div className="field"><label>Email address</label><input className="inp" type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="name@company.com" /></div>
          <div className="two">
            <div className="field"><label>Role</label><Combobox value={role} onValueChange={setRole} options={ROLES} /></div>
            <div className="field"><label>Property scope</label><Combobox value={scope} onValueChange={setScope} options={scopeOpts} /></div>
          </div>
        </DialogBody>
        <DialogFooter><Button variant="outline" onClick={() => setOpen(false)}>Cancel</Button><Button onClick={invite}>Send invite</Button></DialogFooter>
      </Dialog>
    </div>
  );
}

function TemplatesView() {
  const [rows, setRows] = useState(TEMPLATES);
  const [edit, setEdit] = useState(null); // template being edited
  const [lib, setLib] = useState(false);
  const [threshold, setThreshold] = useState("");
  const [instr, setInstr] = useState("");
  const openEdit = (t) => { setEdit(t); setThreshold(t.threshold || ""); setInstr(t.instr); };
  const saveEdit = () => {
    setRows(r => r.map(t => t.id === edit.id ? { ...t, threshold: threshold || null, instr, version: t.version + 1 } : t));
    Toaster.success({ title: "New version saved", description: edit.name + " → v" + (edit.version + 1) + " · live tasks keep their old version" });
    setEdit(null);
  };
  const cloneFrom = (item) => {
    setRows(r => [...r, { id: "t" + (r.length + 1), name: item.name, type: item.type, icon: item.type === "cleaning" ? "spray-can" : item.type === "allergen" ? "wheat" : "thermometer", threshold: item.threshold, ev: item.type === "temperature" ? ["reading"] : ["checklist"], version: 1, instr: "" }]);
    Toaster.success("Added “" + item.name + "” from starter library");
  };
  return (
    <div className="page">
      <Phead title="Check templates" desc="A flat, opinionated list. Pick a type, set the threshold, choose required evidence, add instructions — that's it. Not a form builder: no branching, no custom fields."
        action={<Button onClick={() => setLib(true)}><Lucide name="library" /> Add from starter library</Button>} />
      <div className="stack">
        {rows.map(t => (
          <div className="tpl" key={t.id}>
            <span className="tpl__ic"><Lucide name={t.icon} /></span>
            <div className="tpl__b">
              <div className="tpl__t">{t.name} <span className="tpl__ver">v{t.version}</span></div>
              <div className="tpl__meta">
                <span>Type: <b>{t.type}</b></span>
                {t.threshold ? <span>Target: <b>{t.threshold}</b></span> : <span className="muted">No threshold</span>}
              </div>
              <div className="tpl__ev">
                {t.ev.map(e => <span className="evtag" key={e}><Lucide name={EV_ICON[e]} />{EV_LABEL[e]}</span>)}
              </div>
            </div>
            <button className="iconbtn" onClick={() => openEdit(t)} title="Edit (new version)"><Lucide name="pencil" /></button>
          </div>
        ))}
      </div>

      <Dialog open={!!edit} onOpenChange={(o) => !o && setEdit(null)}>
        <DialogHeader><DialogTitle>Edit template</DialogTitle><DialogDescription>{edit ? edit.name : ""}</DialogDescription></DialogHeader>
        <DialogBody>
          <div className="field"><label>Target threshold</label><input className="inp" value={threshold} onChange={e => setThreshold(e.target.value)} placeholder="e.g. ≤ 4°C (leave blank for none)" /></div>
          <div className="field"><label>Instructions</label><input className="inp" value={instr} onChange={e => setInstr(e.target.value)} /></div>
          <div className="note"><Lucide name="git-branch" /><span>Saving creates <b style={{fontFamily:'var(--font-mono)'}}>version {edit ? edit.version + 1 : ""}</b>. Live and past tasks keep the version they were created with — thresholds never rewrite retroactively.</span></div>
        </DialogBody>
        <DialogFooter><Button variant="outline" onClick={() => setEdit(null)}>Cancel</Button><Button onClick={saveEdit}>Save as new version</Button></DialogFooter>
      </Dialog>

      <Dialog open={lib} onOpenChange={setLib} size="lg">
        <DialogHeader><DialogTitle>HACCP starter library</DialogTitle><DialogDescription>Clone a ready-made template. You can adjust the threshold after.</DialogDescription></DialogHeader>
        <DialogBody>
          {["DE", "NL"].map(cc => (
            <div key={cc} style={{marginBottom:16}}>
              <div className="grp" style={{padding:"0 0 8px"}}>{cc === "DE" ? "Germany" : "Netherlands"}</div>
              <div className="stack">
                {STARTER_LIB[cc].map((item, i) => (
                  <div className="tpl" key={i} style={{padding:12}}>
                    <span className="tpl__ic"><Lucide name={item.type === "cleaning" ? "spray-can" : item.type === "allergen" ? "wheat" : "thermometer"} /></span>
                    <div className="tpl__b"><div className="tpl__t" style={{fontSize:14}}>{item.name}</div>
                      <div className="tpl__meta">{item.threshold ? <span>Target: <b>{item.threshold}</b></span> : <span className="muted">No threshold</span>}</div>
                    </div>
                    <Button size="sm" variant="outline" onClick={() => cloneFrom(item)}><Lucide name="plus" /> Add</Button>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </DialogBody>
        <DialogFooter><Button onClick={() => setLib(false)}>Done</Button></DialogFooter>
      </Dialog>
    </div>
  );
}

function SchedulesView() {
  const [rows, setRows] = useState(SEED_SCHEDULES);
  const [open, setOpen] = useState(false);
  const [tpl, setTpl] = useState(TEMPLATES[0].name);
  const [rec, setRec] = useState("daily");
  const [time, setTime] = useState("08:00");
  const [assignType, setAssignType] = useState("role");
  const [assignee, setAssignee] = useState("Shift lead");
  const roleAssignees = ROLES.map(r => ({ value: r.label, label: r.label }));
  const userAssignees = SEED_USERS.filter(u => u.status !== "deactivated").map(u => ({ value: u.name, label: u.name }));
  const openNew = () => { setTpl(TEMPLATES[0].name); setRec("daily"); setTime("08:00"); setAssignType("role"); setAssignee("Shift lead"); setOpen(true); };
  const save = () => {
    setRows(r => [...r, { id: "s" + (r.length + 1), template: tpl, recurrence: rec, time, assignType, assignee }]);
    setOpen(false);
    Toaster.success({ title: "Schedule created", description: "Applies to new occurrences from now on" });
  };
  const setType = (t) => { setAssignType(t); setAssignee(t === "role" ? "Shift lead" : userAssignees[0].value); };
  return (
    <div className="page">
      <Phead title="Schedules" desc="Turn a template into a recurring check. Changes apply to future occurrences only — past occurrences are immutable."
        action={<Button onClick={openNew}><Lucide name="plus" /> New schedule</Button>} />
      <div className="tablecard">
        <table>
          <thead><tr><th>Template</th><th>Recurrence</th><th>Time</th><th>Assigned to</th><th></th></tr></thead>
          <tbody>
            {rows.map(s => (
              <tr key={s.id}>
                <td style={{fontWeight:500}}>{s.template}</td>
                <td style={{textTransform:"capitalize"}}>{s.recurrence}</td>
                <td className="mono">{s.time}</td>
                <td><span className="flag"><Lucide name={s.assignType === "role" ? "users" : "user"} /><span>{s.assignee}</span><span className="cc">{s.assignType}</span></span></td>
                <td><div className="rowact"><button className="iconbtn"><Lucide name="pencil" /></button></div></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <Dialog open={open} onOpenChange={setOpen}>
        <DialogHeader><DialogTitle>New schedule</DialogTitle><DialogDescription>Recurring check generated from a template.</DialogDescription></DialogHeader>
        <DialogBody>
          <div className="field"><label>Template</label><Combobox value={tpl} onValueChange={setTpl} options={TEMPLATES.map(t => ({ value: t.name, label: t.name }))} /></div>
          <div className="two">
            <div className="field"><label>Recurrence</label>
              <div className="seg">
                {["daily", "weekly", "monthly"].map(r => <button key={r} className={"segbtn" + (rec === r ? " segbtn--on" : "")} onClick={() => setRec(r)} style={{textTransform:"capitalize"}}>{r}</button>)}
              </div>
            </div>
            <div className="field"><label>Time of day</label><input className="inp mono" type="time" value={time} onChange={e => setTime(e.target.value)} /></div>
          </div>
          <div className="field"><label>Assign to <span className="help">(a role or a specific user — exactly one)</span></label>
            <div className="seg" style={{marginBottom:8}}>
              <button className={"segbtn" + (assignType === "role" ? " segbtn--on" : "")} onClick={() => setType("role")}><Lucide name="users" /> Role</button>
              <button className={"segbtn" + (assignType === "user" ? " segbtn--on" : "")} onClick={() => setType("user")}><Lucide name="user" /> Specific user</button>
            </div>
            <Combobox value={assignee} onValueChange={setAssignee} options={assignType === "role" ? roleAssignees : userAssignees} />
          </div>
          <div className="note"><Lucide name="info" /><span>Saving affects <b>future occurrences only</b>. Anything already generated keeps its original schedule.</span></div>
        </DialogBody>
        <DialogFooter><Button variant="outline" onClick={() => setOpen(false)}>Cancel</Button><Button onClick={save}>Create schedule</Button></DialogFooter>
      </Dialog>
    </div>
  );
}

function RollupView() {
  const [openId, setOpenId] = useState("p1");
  const tot = ROLLUP.reduce((a, p) => ({ done: a.done + p.done, overdue: a.overdue + p.overdue, failed: a.failed + p.failed, total: a.total + p.total }), { done: 0, overdue: 0, failed: 0, total: 0 });
  return (
    <div className="page">
      <Phead title="Today across all properties" desc="Live compliance health for every property and outlet. Drill into a property to see its outlets." />
      <div className="summary">
        <div className="kpi"><div className="n">{tot.done}/{tot.total}</div><div className="l">Checks done today</div></div>
        <div className="kpi"><div className="n" style={{color:"var(--status-overdue-fg)"}}>{tot.overdue}</div><div className="l">Overdue</div></div>
        <div className="kpi"><div className="n" style={{color:"var(--status-fail-fg)"}}>{tot.failed}</div><div className="l">Failed</div></div>
        <div className="kpi"><div className="n">{ROLLUP.length}</div><div className="l">Properties</div></div>
      </div>
      <div className="roll">
        {ROLLUP.map(p => {
          const donePct = (p.done / p.total) * 100;
          const failPct = (p.failed / p.total) * 100;
          const overPct = (p.overdue / p.total) * 100;
          const open = openId === p.id;
          return (
            <div className="rollcard" key={p.id} onClick={() => setOpenId(open ? null : p.id)}>
              <div className="rollcard__h">
                <div><b>{p.name}</b><div className="muted mono" style={{fontSize:12,marginTop:2}}>{p.tz}</div></div>
                <span className="rollcard__pct" style={{color: p.failed ? "var(--status-fail-fg)" : p.overdue ? "var(--status-overdue-fg)" : "var(--status-pass-fg)"}}>{Math.round(donePct)}%</span>
              </div>
              <div className="rollbar">
                <span style={{width:donePct+"%",background:"var(--status-pass)"}}></span>
                <span style={{width:overPct+"%",background:"var(--status-overdue)"}}></span>
                <span style={{width:failPct+"%",background:"var(--status-fail)"}}></span>
              </div>
              <div className="rollstats">
                <StatusBadge status="pass" size="sm">{p.done} done</StatusBadge>
                {p.overdue ? <StatusBadge status="overdue" size="sm">{p.overdue} overdue</StatusBadge> : null}
                {p.failed ? <StatusBadge status="fail" size="sm">{p.failed} failed</StatusBadge> : null}
              </div>
              {open && (
                <div className="rolloutlets" onClick={e => e.stopPropagation()}>
                  {p.outlets.map((o, i) => (
                    <div className="outlet" key={i}><span>{o.n}</span><span className="n">{o.done}/{o.total}</span></div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

const NAV = [
  { id: "today", label: "Today", icon: "layout-dashboard", group: "Overview" },
  { id: "records", label: "Records", icon: "clipboard-list", group: "Overview" },
  { id: "exceptions", label: "Exceptions", icon: "triangle-alert", group: "Overview" },
  { id: "properties", label: "Properties", icon: "building-2", group: "Configure" },
  { id: "users", label: "Users", icon: "users", group: "Configure" },
  { id: "templates", label: "Templates", icon: "clipboard-check", group: "Configure" },
  { id: "schedules", label: "Schedules", icon: "calendar-clock", group: "Configure" },
  { id: "cmdk", label: "Search (⌘K)", icon: "search", group: "Configure" },
];

function App() {
  const [view, setView] = useState("today");
  const go = (id) => { if (id === "cmdk") { Toaster.info("Command menu (⌘K) — reserved for a later release"); return; } setView(id); };
  const groups = ["Overview", "Configure"];
  return (
    <div className="app">
      <aside className="sb">
        <div className="brand"><span className="mark"><Lucide name="clipboard-check" /></span><span className="nm">Shift Ledger</span></div>
        <button className="switch"><span className="av">NG</span><span className="txt"><b>Nourish Group</b><span>3 properties</span></span><Lucide name="chevrons-up-down" /></button>
        {groups.map(g => (
          <React.Fragment key={g}>
            <div className="grp">{g}</div>
            {NAV.filter(n => n.group === g).map(n => (
              <button key={n.id} className="nav" aria-current={view === n.id || undefined} onClick={() => go(n.id)}><Lucide name={n.icon} />{n.label}</button>
            ))}
          </React.Fragment>
        ))}
        <div className="sbfoot"><span className="av">JD</span><span className="txt"><b>Jordan Diaz</b><span>Org admin</span></span></div>
      </aside>
      <div className="main">
        {view === "today" && <RollupView />}
        {view === "properties" && <PropertiesView />}
        {view === "users" && <UsersView />}
        {view === "templates" && <TemplatesView />}
        {view === "schedules" && <SchedulesView />}
        {(view === "records" || view === "exceptions") && (
          <div className="page"><Phead title={view === "records" ? "Records" : "Exceptions"} desc="See the dedicated screens: audit-export.html and the mobile Exceptions view." />
            <EmptyState icon={<span />} title="Lives on another screen" description="This console focuses on the org configuration + Today rollup." />
          </div>
        )}
      </div>
      <Toaster />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);

name: QA Evidence (keyless)

# Deterministic QA-evidence step. No LLM, no API key. Runs AFTER the CI workflow finishes:
# if CI passed on a PR, it attaches passing evidence to the PR + linked issue and labels it.
# NEVER merges or closes — Done still requires a human merge (CLAUDE.md §4). See docs/automation.md.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  evidence:
    # Only when CI succeeded and it was a pull_request run.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      RUN_URL: ${{ github.event.workflow_run.html_url }}
      # JSON array of associated PRs (populated for same-repo PRs). Passed via env to avoid script injection.
      PRS_JSON: ${{ toJson(github.event.workflow_run.pull_requests) }}
    steps:
      - name: Attach QA evidence
        shell: bash
        run: |
          set -euo pipefail
          PR=$(printf '%s' "$PRS_JSON" | jq -r '.[0].number // empty')
          if [ -z "$PR" ]; then echo "No associated same-repo PR; nothing to do."; exit 0; fi

          # Idempotency: skip if evidence already attached.
          if gh pr view "$PR" --repo "$REPO" --json labels --jq '.labels[].name' | grep -qx "qa:evidence-attached"; then
            echo "PR #$PR already has qa:evidence-attached; skipping."; exit 0
          fi

          BODY=$(cat <<EOF
          ✅ **QA gate passed** — automated evidence

          The CI gate completed **green**: lint · typecheck · test (RLS isolation + \`activity_log\` immutability) · build.

          Evidence: CI run $RUN_URL

          _This is the QA-evidence step only. Definition of Done still requires human review + merge (CLAUDE.md §4)._
          EOF
          )

          gh pr comment "$PR" --repo "$REPO" --body "$BODY"
          gh pr edit "$PR" --repo "$REPO" --add-label "qa:evidence-attached"

          # Mirror evidence onto the linked issue (Closes/Fixes/Resolves #N in the PR body).
          ISSUE=$(gh pr view "$PR" --repo "$REPO" --json body --jq '.body' \
            | grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?) #[0-9]+' | grep -oE '[0-9]+' | head -1 || true)
          if [ -n "${ISSUE:-}" ]; then
            gh issue comment "$ISSUE" --repo "$REPO" --body "$BODY

          (from PR #$PR)"
            echo "Mirrored evidence to issue #$ISSUE."
          fi
